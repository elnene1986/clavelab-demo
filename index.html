<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>El Plano — Aprende a leer planos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --blue-deep:#16386F;      /* blueprint field */
    --blue-line:#DDE9FB;      /* drawing linework on blue */
    --blue-dim:#8FB2E8;       /* secondary linework */
    --paper:#F2F5F9;          /* drafting paper */
    --ink:#14202E;
    --ink-soft:#54627A;
    --orange:#FF6B1A;         /* hi-vis accent */
    --orange-dark:#D9530A;
    --green:#1C9E5A;
    --red:#D6402E;
    --card:#FFFFFF;
    --line:#D7DFEA;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'IBM Plex Sans',sans-serif;
    background:#233247;
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:18px 0;
  }
  /* phone shell */
  .phone{
    width:100%;max-width:400px;height:min(820px,calc(100vh - 36px));
    background:var(--paper);border-radius:34px;overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.45), 0 0 0 10px #0E1826, 0 0 0 12px #31435C;
    display:flex;flex-direction:column;position:relative;
  }
  @media (max-width:440px){
    body{padding:0;background:var(--paper)}
    .phone{max-width:none;height:100vh;height:100dvh;border-radius:0;box-shadow:none}
  }
  /* drafting-paper grid on app background */
  .phone::before{
    content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;
    background-image:
      linear-gradient(to right, rgba(22,56,111,.045) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(22,56,111,.045) 1px, transparent 1px);
    background-size:22px 22px;
  }

  /* header */
  header{
    position:relative;z-index:2;
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 20px 12px;
  }
  .logo{display:flex;align-items:center;gap:10px}
  .logo-mark{
    width:38px;height:38px;border-radius:9px;background:var(--blue-deep);
    display:grid;place-items:center;flex:none;
  }
  .logo-mark svg{display:block}
  .logo-type{font-family:'Big Shoulders Display';font-weight:800;font-size:24px;letter-spacing:.04em;line-height:1;color:var(--blue-deep)}
  .logo-sub{font-size:10.5px;color:var(--ink-soft);letter-spacing:.02em;margin-top:2px}
  .lang{
    font-family:'IBM Plex Mono';font-size:12px;font-weight:500;
    border:1.5px solid var(--blue-deep);border-radius:999px;background:var(--card);
    color:var(--blue-deep);padding:6px 12px;cursor:pointer;
  }
  .lang:focus-visible,button:focus-visible,.module:focus-visible{outline:3px solid var(--orange);outline-offset:2px}

  main{position:relative;z-index:1;flex:1;overflow-y:auto;padding:6px 20px 28px;scrollbar-width:none}
  main::-webkit-scrollbar{display:none}
  .screen{display:none;animation:fade .25s ease}
  .screen.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){
    .screen,.feedback,.shake{animation:none !important}
  }

  /* ---------- HOME ---------- */
  .hero{
    background:var(--blue-deep);border-radius:var(--radius);
    padding:18px 18px 16px;color:var(--blue-line);position:relative;overflow:hidden;
    margin-bottom:18px;
  }
  .hero::after{ /* faint drafting lines */
    content:"";position:absolute;inset:0;opacity:.16;pointer-events:none;
    background-image:
      linear-gradient(to right, var(--blue-line) 1px, transparent 1px),
      linear-gradient(to bottom, var(--blue-line) 1px, transparent 1px);
    background-size:26px 26px;
  }
  .hero h1{font-family:'Big Shoulders Display';font-weight:800;font-size:26px;letter-spacing:.03em;color:#fff;line-height:1.05;position:relative}
  .hero p{font-size:13px;margin-top:6px;position:relative;color:var(--blue-dim)}
  .hero .stat-row{display:flex;gap:14px;margin-top:14px;position:relative}
  .stat{background:rgba(255,255,255,.08);border:1px solid rgba(221,233,251,.25);border-radius:10px;padding:8px 12px;flex:1}
  .stat b{font-family:'IBM Plex Mono';font-size:17px;color:#fff;display:block}
  .stat span{font-size:10.5px;color:var(--blue-dim)}

  .section-label{
    font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.12em;
    color:var(--ink-soft);text-transform:uppercase;margin:0 0 10px 2px;
  }
  .module{
    width:100%;text-align:left;display:flex;align-items:center;gap:14px;
    background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-bottom:10px;cursor:pointer;font-family:inherit;
  }
  .module.active{border-color:var(--orange)}
  .module .m-num{
    font-family:'IBM Plex Mono';font-size:12px;color:var(--blue-deep);
    width:44px;height:44px;flex:none;border:1.5px dashed var(--blue-dim);
    border-radius:10px;display:grid;place-items:center;background:var(--paper);
  }
  .module.active .m-num{border-style:solid;border-color:var(--orange);color:var(--orange-dark);font-weight:500}
  .module h3{font-size:14.5px;font-weight:600}
  .module p{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .module .m-body{flex:1;min-width:0}
  .module .m-cta{
    font-family:'IBM Plex Mono';font-size:11px;flex:none;
    color:var(--orange-dark);font-weight:500;
  }
  .module.locked{opacity:.55;cursor:default}
  .module.locked .m-cta{color:var(--ink-soft)}
  .progress-track{height:5px;border-radius:99px;background:var(--line);margin-top:8px;overflow:hidden}
  .progress-fill{height:100%;width:20%;background:var(--orange);border-radius:99px}

  /* ---------- LESSON ---------- */
  .lesson-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .back-btn{
    border:1.5px solid var(--line);background:var(--card);border-radius:10px;
    width:36px;height:36px;font-size:16px;cursor:pointer;color:var(--ink);flex:none;
  }
  .dots{display:flex;gap:6px;flex:1;justify-content:center}
  .dot{width:26px;height:6px;border-radius:99px;background:var(--line)}
  .dot.done{background:var(--green)}
  .dot.wrong{background:var(--red)}
  .dot.now{background:var(--orange)}
  .q-count{font-family:'IBM Plex Mono';font-size:12px;color:var(--ink-soft);flex:none}

  .q-card{background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px}
  .q-tag{font-family:'IBM Plex Mono';font-size:10.5px;letter-spacing:.1em;color:var(--orange-dark);text-transform:uppercase}
  .q-text{font-size:16px;font-weight:600;margin-top:6px;line-height:1.35}

  .plan-wrap{
    border-radius:var(--radius);overflow:hidden;background:var(--blue-deep);
    border:1.5px solid #0F2A57;box-shadow:inset 0 0 40px rgba(0,0,0,.25);
  }
  .plan-wrap svg{display:block;width:100%;height:auto}
  .hotspot{fill:transparent;cursor:pointer}
  .hotspot.correct-flash{fill:rgba(28,158,90,.35)}
  .hotspot.wrong-flash{fill:rgba(214,64,46,.35)}
  .plan-hint{
    font-family:'IBM Plex Mono';font-size:11px;color:var(--ink-soft);
    text-align:center;margin-top:8px;
  }
  .shake{animation:shake .3s ease}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

  .choices{display:flex;flex-direction:column;gap:9px;margin-top:4px}
  .choice{
    text-align:left;background:var(--card);border:1.5px solid var(--line);
    border-radius:12px;padding:13px 14px;font-size:14.5px;font-family:inherit;
    cursor:pointer;display:flex;align-items:center;gap:10px;color:var(--ink);
  }
  .choice .key{
    font-family:'IBM Plex Mono';font-size:11px;color:var(--ink-soft);
    border:1px solid var(--line);border-radius:6px;padding:2px 7px;flex:none;
  }
  .choice.correct{border-color:var(--green);background:#EDF9F2}
  .choice.wrong{border-color:var(--red);background:#FCEFED}
  .choice:disabled{cursor:default}
  .symbol-preview{
    background:var(--blue-deep);border-radius:12px;padding:10px;
    display:grid;place-items:center;margin-bottom:12px;border:1.5px solid #0F2A57;
  }

  .feedback{
    margin-top:14px;border-radius:var(--radius);padding:14px 15px;
    display:none;animation:fade .25s ease;
  }
  .feedback.show{display:block}
  .feedback.good{background:#EDF9F2;border:1.5px solid var(--green)}
  .feedback.bad{background:#FCEFED;border:1.5px solid var(--red)}
  .feedback h4{font-size:13.5px;display:flex;align-items:center;gap:7px}
  .feedback.good h4{color:var(--green)}
  .feedback.bad h4{color:var(--red)}
  .feedback p{font-size:13px;color:var(--ink);margin-top:6px;line-height:1.45}
  .btn{
    width:100%;border:none;border-radius:12px;padding:14px;margin-top:12px;
    font-family:'IBM Plex Sans';font-size:15px;font-weight:600;cursor:pointer;
    background:var(--orange);color:#fff;box-shadow:0 3px 0 var(--orange-dark);
  }
  .btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--orange-dark)}
  .btn.ghost{background:var(--card);color:var(--ink);border:1.5px solid var(--line);box-shadow:none}

  /* ---------- RESULTS ---------- */
  .result-card{
    background:var(--blue-deep);border-radius:var(--radius);padding:26px 20px;
    text-align:center;color:#fff;position:relative;overflow:hidden;margin-top:8px;
  }
  .result-card::after{
    content:"";position:absolute;inset:0;opacity:.14;pointer-events:none;
    background-image:
      linear-gradient(to right, var(--blue-line) 1px, transparent 1px),
      linear-gradient(to bottom, var(--blue-line) 1px, transparent 1px);
    background-size:26px 26px;
  }
  .score{font-family:'IBM Plex Mono';font-size:44px;font-weight:500;position:relative}
  .score small{font-size:18px;color:var(--blue-dim)}
  .result-card h2{font-family:'Big Shoulders Display';font-weight:800;font-size:24px;letter-spacing:.03em;margin-top:6px;position:relative}
  .result-card p{font-size:13px;color:var(--blue-dim);margin-top:6px;position:relative}
  .stamp{
    position:relative;display:inline-block;margin-top:16px;
    font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.14em;
    border:2px solid var(--orange);color:var(--orange);
    padding:6px 14px;border-radius:6px;transform:rotate(-4deg);text-transform:uppercase;
  }
</style>
</head>
<body>
<div class="phone">
  <header>
    <div class="logo">
      <div class="logo-mark">
        <!-- section-cut mark as logo -->
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
          <circle cx="11" cy="11" r="8.5" stroke="#DDE9FB" stroke-width="1.6"/>
          <line x1="11" y1="2.5" x2="11" y2="19.5" stroke="#FF6B1A" stroke-width="1.6"/>
          <path d="M11 2.5 L14 6 H8 Z" fill="#FF6B1A"/>
        </svg>
      </div>
      <div>
        <div class="logo-type">EL PLANO</div>
        <div class="logo-sub" data-i18n="tagline">Aprende a leer planos de obra</div>
      </div>
    </div>
    <button class="lang" id="langBtn" aria-label="Switch language">EN</button>
  </header>

  <main id="main">

    <!-- ============ HOME ============ -->
    <section class="screen active" id="home">
      <div class="hero">
        <h1 data-i18n="heroTitle">De ayudante a maestro de obra</h1>
        <p data-i18n="heroSub">Domina los planos que ves todos los días en la obra. 5 minutos al día.</p>
        <div class="stat-row">
          <div class="stat"><b>3</b><span data-i18n="statStreak">días seguidos</span></div>
          <div class="stat"><b>12</b><span data-i18n="statSymbols">símbolos dominados</span></div>
          <div class="stat"><b>1/5</b><span data-i18n="statModules">módulos</span></div>
        </div>
      </div>

      <p class="section-label" data-i18n="modulesLabel">Módulos del curso</p>

      <button class="module active" onclick="startLesson()">
        <div class="m-num">M-01</div>
        <div class="m-body">
          <h3 data-i18n="m1t">Símbolos básicos</h3>
          <p data-i18n="m1s">Puertas, ventanas, muros, cortes y cotas</p>
          <div class="progress-track"><div class="progress-fill"></div></div>
        </div>
        <div class="m-cta" data-i18n="continue">SEGUIR ›</div>
      </button>

      <button class="module locked" tabindex="-1">
        <div class="m-num">M-02</div>
        <div class="m-body">
          <h3 data-i18n="m2t">Cortes y secciones</h3>
          <p data-i18n="m2s">Cómo se lee un corte A-A y una elevación</p>
        </div>
        <div class="m-cta">🔒</div>
      </button>

      <button class="module locked" tabindex="-1">
        <div class="m-num">M-03</div>
        <div class="m-body">
          <h3 data-i18n="m3t">Cotas y escalas</h3>
          <p data-i18n="m3s">Medidas reales a partir del plano</p>
        </div>
        <div class="m-cta">🔒</div>
      </button>

      <button class="module locked" tabindex="-1">
        <div class="m-num">M-04</div>
        <div class="m-body">
          <h3 data-i18n="m4t">Plano eléctrico</h3>
          <p data-i18n="m4s">Contactos, apagadores y circuitos</p>
        </div>
        <div class="m-cta">🔒</div>
      </button>

      <button class="module locked" tabindex="-1">
        <div class="m-num">M-05</div>
        <div class="m-body">
          <h3 data-i18n="m5t">Cimentación y estructura</h3>
          <p data-i18n="m5s">Zapatas, castillos, trabes y armado</p>
        </div>
        <div class="m-cta">🔒</div>
      </button>
    </section>

    <!-- ============ LESSON ============ -->
    <section class="screen" id="lesson">
      <div class="lesson-top">
        <button class="back-btn" onclick="goHome()" aria-label="Back">←</button>
        <div class="dots" id="dots"></div>
        <div class="q-count" id="qCount">1/5</div>
      </div>

      <div class="q-card">
        <div class="q-tag" id="qTag"></div>
        <div class="q-text" id="qText"></div>
      </div>

      <div id="qBody"></div>

      <div class="feedback" id="feedback">
        <h4 id="fbTitle"></h4>
        <p id="fbText"></p>
        <button class="btn" id="nextBtn" onclick="nextQuestion()"></button>
      </div>
    </section>

    <!-- ============ RESULTS ============ -->
    <section class="screen" id="results">
      <div class="result-card">
        <div class="score"><span id="scoreNum">0</span><small>/5</small></div>
        <h2 id="resTitle"></h2>
        <p id="resSub"></p>
        <div class="stamp" data-i18n="stamp">Lección aprobada</div>
      </div>
      <button class="btn" onclick="startLesson()" data-i18n="retry">Repetir lección</button>
      <button class="btn ghost" onclick="goHome()" data-i18n="backHome">Volver a los módulos</button>
    </section>

  </main>
</div>

<script>
/* =============== i18n =============== */
let lang = 'es';
const STR = {
  es:{
    tagline:'Aprende a leer planos de obra',
    heroTitle:'De ayudante a maestro de obra',
    heroSub:'Domina los planos que ves todos los días en la obra. 5 minutos al día.',
    statStreak:'días seguidos', statSymbols:'símbolos dominados', statModules:'módulos',
    modulesLabel:'Módulos del curso',
    m1t:'Símbolos básicos', m1s:'Puertas, ventanas, muros, cortes y cotas',
    m2t:'Cortes y secciones', m2s:'Cómo se lee un corte A-A y una elevación',
    m3t:'Cotas y escalas', m3s:'Medidas reales a partir del plano',
    m4t:'Plano eléctrico', m4s:'Contactos, apagadores y circuitos',
    m5t:'Cimentación y estructura', m5s:'Zapatas, castillos, trabes y armado',
    continue:'SEGUIR ›',
    tapTag:'Toca en el plano', mcTag:'Opción múltiple',
    planHint:'Toca directamente sobre el dibujo',
    correct:'✓ Correcto', incorrect:'✗ Casi — mira aquí',
    next:'Siguiente', finish:'Ver resultado',
    stamp:'Lección aprobada', retry:'Repetir lección', backHome:'Volver a los módulos',
    resGood:'¡Ya lees como maestro!', resMid:'Vas bien, sigue así', resLow:'Repite y lo dominas',
    resSub:'Símbolos básicos · Lección 2 de 5'
  },
  en:{
    tagline:'Learn to read construction drawings',
    heroTitle:'From laborer to foreman',
    heroSub:'Master the drawings you see on site every day. 5 minutes a day.',
    statStreak:'day streak', statSymbols:'symbols mastered', statModules:'modules',
    modulesLabel:'Course modules',
    m1t:'Basic symbols', m1s:'Doors, windows, walls, cuts and dimensions',
    m2t:'Cuts & sections', m2s:'How to read an A-A section and an elevation',
    m3t:'Dimensions & scales', m3s:'Real measurements from the drawing',
    m4t:'Electrical plan', m4s:'Outlets, switches and circuits',
    m5t:'Foundation & structure', m5s:'Footings, columns, beams and rebar',
    continue:'CONTINUE ›',
    tapTag:'Tap on the plan', mcTag:'Multiple choice',
    planHint:'Tap directly on the drawing',
    correct:'✓ Correct', incorrect:'✗ Almost — look here',
    next:'Next', finish:'See results',
    stamp:'Lesson passed', retry:'Repeat lesson', backHome:'Back to modules',
    resGood:'You read like a foreman!', resMid:'Good progress, keep going', resLow:'Repeat it and you\'ll master it',
    resSub:'Basic symbols · Lesson 2 of 5'
  }
};
function t(k){return STR[lang][k]}
function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n'); if(STR[lang][k]) el.textContent=STR[lang][k];
  });
  document.getElementById('langBtn').textContent = lang==='es' ? 'EN' : 'ES';
  document.documentElement.lang = lang;
}
document.getElementById('langBtn').addEventListener('click',()=>{
  lang = lang==='es' ? 'en' : 'es';
  applyI18n();
  if(document.getElementById('lesson').classList.contains('active')) renderQuestion(false);
});

/* =============== blueprint SVG =============== */

      <line x1="240" y1="388" x2="240" y2="318"/>
      <path d="M240 318 A70 70 0 0 1 310 388"/>

    <!-- WINDOW left wall: triple line -->

      <line x1="588" y1="150" x2="588" y2="240"/>

      <line x1="600" y1="150" x2="600" y2="240"/>

    <!-- SECTION MARK A-A through plan -->
    <g id="g-section">
      <line x1="470" y1="70" x2="470" y2="410" stroke="#FF6B1A" stroke-width="1.6" stroke-dasharray="10 6"/>
      <circle cx="470" cy="70" r="15" fill="#16386F" stroke="#FF6B1A" stroke-width="2"/>
      <text x="470" y="75" fill="#FF6B1A" font-family="'IBM Plex Mono',monospace" font-size="13" text-anchor="middle">A</text>

/* mini symbol for MC question (window in plan) */

  return `
  <svg viewBox="0 0 200 90" width="180" height="82" xmlns="http://www.w3.org/2000/svg" aria-label="Symbol">
    <rect width="200" height="90" fill="#16386F"/>

    <line x1="20" y1="60" x2="70" y2="60"/><line x1="130" y1="60" x2="180" y2="60"/></g>
    <g stroke="#FFFFFF" stroke-width="2"><line x1="70" y1="34" x2="130" y2="34"/><line x1="70" y1="45" x2="130" y2="45"/><line x1="70" y1="56" x2="130" y2="56"/>
    <line x1="70" y1="30" x2="70" y2="60"/><line x1="130" y1="30" x2="130" y2="60"/></g>
  </svg>`;
}

/* =============== questions =============== */
const QUESTIONS = [
  { type:'tap', target:'door',
    q:{es:'Toca la puerta en el plano.', en:'Tap the door on the plan.'},
    exp:{es:'La puerta se dibuja con un arco de un cuarto de círculo: muestra hacia dónde abre la hoja. El hueco en el muro es el vano.',
         en:'A door is drawn with a quarter-circle arc: it shows which way the leaf swings. The gap in the wall is the opening.'} },
  { type:'mc', symbol:true, answer:0,
    q:{es:'¿Qué representa este símbolo?', en:'What does this symbol represent?'},
    opts:{es:['Ventana','Puerta corrediza','Viga','Muro de carga'],
          en:['Window','Sliding door','Beam','Load-bearing wall']},
    exp:{es:'Tres líneas paralelas dentro del muro = ventana en planta. Las líneas representan el marco y el vidrio.',
         en:'Three parallel lines inside the wall = a window in plan view. The lines represent the frame and the glass.'} },
  { type:'tap', target:'section',
    q:{es:'¿Dónde está la marca de corte A-A?', en:'Where is the A-A section mark?'},
    exp:{es:'El círculo con la letra A y la línea discontinua marcan por dónde se “corta” el edificio. Ese corte se dibuja en otra hoja como sección A-A.',
         en:'The circle with the letter A and the dashed line mark where the building is “cut”. That cut is drawn on another sheet as section A-A.'} },
  { type:'mc', answer:0,
    q:{es:'El plano dice ESC 1:50. Entonces 1 cm en el papel equivale a…', en:'The sheet says SCALE 1:50. So 1 cm on paper equals…'},
    opts:{es:['50 cm reales','5 cm reales','1.5 m reales','50 m reales'],
          en:['50 cm in real life','5 cm in real life','1.5 m in real life','50 m in real life']},
    exp:{es:'En escala 1:50, todo lo real es 50 veces más grande que en el papel. 1 cm × 50 = 50 cm. La escala siempre está en el cuadro de títulos.',
         en:'At 1:50 scale, everything real is 50 times bigger than on paper. 1 cm × 50 = 50 cm. The scale is always in the title block.'} },
  { type:'tap', target:'dim',
    q:{es:'Toca la cota que indica el ancho total de la casa.', en:'Tap the dimension that shows the total width of the house.'},
    exp:{es:'La línea con flechas en las puntas es la cota: aquí dice 6.40 m de muro a muro. Las cotas mandan sobre la medida a escala.',
         en:'The line with arrows at both ends is the dimension line: here it reads 6.40 m wall to wall. Written dimensions always override scaled measurements.'} }
];

/* =============== state & flow =============== */
let qIndex = 0, score = 0, answered = false, results = [];

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('main').scrollTop = 0;
}
function goHome(){ show('home'); }
function startLesson(){
  qIndex = 0; score = 0; results = [];
  show('lesson');
  renderQuestion(true);
}

function renderDots(){
  const d = document.getElementById('dots'); d.innerHTML='';
  QUESTIONS.forEach((_,i)=>{
    const el = document.createElement('div'); el.className='dot';
    if(results[i]===true) el.classList.add('done');
    else if(results[i]===false) el.classList.add('wrong');
    else if(i===qIndex) el.classList.add('now');
    d.appendChild(el);
  });
  document.getElementById('qCount').textContent = (qIndex+1)+'/'+QUESTIONS.length;
}

function renderQuestion(reset){
  if(reset!==false) answered = false;
  const q = QUESTIONS[qIndex];
  renderDots();
  document.getElementById('qTag').textContent = q.type==='tap' ? t('tapTag') : t('mcTag');
  document.getElementById('qText').textContent = q.q[lang];
  const body = document.getElementById('qBody');
  const fb = document.getElementById('feedback');
  if(!answered){ fb.className='feedback'; }

  if(q.type==='tap'){
    body.innerHTML = `<div class="plan-wrap" id="planWrap">${planSVG()}</div>
                      <div class="plan-hint">${t('planHint')}</div>`;
    body.querySelectorAll('.hotspot').forEach(hs=>{
      hs.addEventListener('click',()=>onTap(hs,q));
    });
  } else {
    let html = '';
    if(q.symbol) html += `<div class="symbol-preview">${windowSymbolSVG()}</div>`;
    html += `<div class="choices">` + q.opts[lang].map((o,i)=>
      `<button class="choice" data-i="${i}"><span class="key">${String.fromCharCode(65+i)}</span>${o}</button>`
    ).join('') + `</div>`;
    body.innerHTML = html;
    body.querySelectorAll('.choice').forEach(btn=>{
      btn.addEventListener('click',()=>onChoice(btn,q));
    });
  }
}

function onTap(hs,q){
  if(answered) return;
  const ok = hs.dataset.hs === q.target;
  if(ok){
    answered = true;
    hs.classList.add('correct-flash');
    finishAnswer(true,q);
  } else {
    hs.classList.add('wrong-flash');
    const wrap = document.getElementById('planWrap');
    wrap.classList.remove('shake'); void wrap.offsetWidth; wrap.classList.add('shake');
    setTimeout(()=>hs.classList.remove('wrong-flash'),450);
    if(!results.hasOwnProperty(qIndex)) { /* first wrong tap marks it */ }
    // one wrong tap = question counts as missed, but let them find it
    if(results[qIndex]===undefined){ results[qIndex]=false; renderDots(); }
  }
}
function onChoice(btn,q){
  if(answered) return;
  answered = true;
  const i = +btn.dataset.i;
  const ok = i===q.answer;
  btn.classList.add(ok?'correct':'wrong');
  const all = btn.parentElement.querySelectorAll('.choice');
  all.forEach(b=>{ b.disabled=true; if(+b.dataset.i===q.answer) b.classList.add('correct'); });
  finishAnswer(ok,q);
}
function finishAnswer(ok,q){
  if(results[qIndex]===undefined) results[qIndex]=ok;
  if(results[qIndex]) score = results.filter(r=>r===true).length;
  score = results.filter(r=>r===true).length;
  renderDots();
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (results[qIndex] ? 'good':'bad');
  document.getElementById('fbTitle').textContent = results[qIndex] ? t('correct') : t('incorrect');
  document.getElementById('fbText').textContent = q.exp[lang];
  document.getElementById('nextBtn').textContent = (qIndex===QUESTIONS.length-1) ? t('finish') : t('next');
}
function nextQuestion(){
  if(qIndex === QUESTIONS.length-1){ showResults(); return; }
  qIndex++;
  renderQuestion(true);
}
function showResults(){
  show('results');
  document.getElementById('scoreNum').textContent = score;
  const title = score>=5 ? t('resGood') : score>=3 ? t('resMid') : t('resLow');
  document.getElementById('resTitle').textContent = title;
  document.getElementById('resSub').textContent = t('resSub');
}

applyI18n();
</script>
